<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Click Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #gameArea {
            width: 500px;
            height: 500px;
            border: 2px solid black;
            margin: 20px auto;
            position: relative;
        }

        #box {
            width: 50px;
            height: 50px;
            position: absolute;
            display: none;
            cursor: pointer;
            background-color: red;
        }
    </style>
</head>
<body>

<h2>Клікни на квадрат</h2>

<button onclick="startGame()">Старт</button>

<br><br>

<label>Складність:</label>
<select id="difficulty">
    <option value="3000">Легка (3 сек)</option>
    <option value="2000">Середня (2 сек)</option>
    <option value="1500">Важка (1.5 сек)</option>
</select>

<p>Очки: <span id="score">0</span></p>
<p id="status"></p>

<div id="gameArea">
    <div id="box"></div>
</div>

<script src="script.js"></script>

</body>
</html>
