<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Click Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #gameArea {
            width: 1000px;
            height: 700px;
            margin: 20px auto;
            position: relative;
            background-color: white;
        }

        #box {
            width: 50px;
            height: 50px;
            position: absolute;
            display: none;
            cursor: pointer;
        }

        /* 🔥 Popup */
        #gameOverModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        #gameOverContent {
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2>Клікни на квадрат</h2>

<button id="startBtn">Старт</button>

<br><br>

<label>Складність:</label>
<select id="difficulty">
    <option value="3000">Легка (3 сек)</option>
    <option value="2000">Середня (2 сек)</option>
    <option value="1500">Важка (1.5 сек)</option>
</select>

<br><br>

<label>Колір:</label>
<input type="color" id="colorPicker" value="#ff0000">

<p>Очки: <span id="score">0</span></p>
<p id="status"></p>

<div id="gameArea">
    <div id="box"></div>
</div>

<!-- 🔥 Popup -->
<div id="gameOverModal">
    <div id="gameOverContent">
        <h2>Game Over</h2>
        <p id="finalScore"></p>
        <button onclick="closeModal()">ОК</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
