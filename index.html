<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Click Game</title>
    <style>
    body {
        margin: 0;
        font-family: Arial;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h2 {
        margin-top: 20px;
    }

    #gameArea {
        width: 600px;
        height: 400px;
        margin-top: 20px;
        position: relative;
        background-color: #f0f0f0;
        border-radius: 10px;
        overflow: hidden;
    }

    #box {
        width: 50px;
        height: 50px;
        position: absolute;
        display: none;
        cursor: pointer;
    }

    #status {
        margin-top: 10px;
        font-weight: bold;
    }

    button, select, input {
        margin: 5px;
    }
</style>
</head>
<body>

<h2>Клікни на квадрат</h2>

<button id="startBtn">Старт</button>

<br><br>

<label>Складність:</label>
<select id="difficulty">
    <option value="3000">Легка (3 сек)</option>
    <option value="2000">Середня (2 сек)</option>
    <option value="1500">Важка (1.5 сек)</option>
</select>

<br><br>

<label>Колір:</label>
<input type="color" id="colorPicker" value="#ff0000">

<p>Очки: <span id="score">0</span></p>
    <p>Час: <span id="timeLeft">0.0</span> сек</p>
<p id="status"></p>

<div id="gameArea">
    <div id="box"></div>
</div>

<script src="script.js"></script>

</body>
</html>
