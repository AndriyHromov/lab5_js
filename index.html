<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Game</title>
    <style>
        #gameArea {
            width: 400px;
            height: 400px;
            border: 2px solid black;
            position: relative;
        }

        #box {
            width: 50px;
            height: 50px;
            position: absolute;
            display: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Клікни на квадрат!</h2>

<label>Колір:</label>
<input type="color" id="colorPicker">

<br><br>

<label>Складність:</label>
<select id="difficulty">
    <option value="1500">Легка</option>
    <option value="1000">Середня</option>
    <option value="500">Важка</option>
</select>

<p>Очки: <span id="score">0</span></p>

<div id="gameArea">
    <div id="box"></div>
</div>

<script src="script.js"></script>

</body>
</html>
